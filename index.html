<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MVP - Commande de repas</title>

  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
    input, select, button { width: 100%; padding: 10px; margin-top: 10px; }
    button { background: green; color: white; }
  </style>
</head>

<body>

<h2>Commande</h2>

<div class="container">
  <select id="plat">
    <option>Pizza</option>
    <option>Burger</option>
    <option>Tacos</option>
  </select>

  <input id="nom" placeholder="Nom">
  <input id="telephone" placeholder="Téléphone">

  <button id="btn">Commander</button>
</div>

<!-- 🔴 NE TOUCHE PAS CETTE PARTIE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxuLk1rBMs4_lipD8s6pIsV9U41tuyPYo",
  authDomain: "mvp-restaurant.firebaseapp.com",
  projectId: "mvp-restaurant",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👉 bouton
document.getElementById("btn").addEventListener("click", async () => {

  const nom = document.getElementById("nom").value;
  const tel = document.getElementById("telephone").value;

  if (!nom || !tel) {
    alert("Remplir les champs");
    return;
  }

  try {
    await addDoc(collection(db, "commandes"), {
      nom: nom,
      telephone: tel,
      date: new Date()
    });

    alert("OK enregistré !");
  } catch (e) {
    alert("Erreur Firebase");
    console.log(e);
  }

});

</script>

</body>
</html>
