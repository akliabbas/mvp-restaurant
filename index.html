<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MVP Commande</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 350px;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: green;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Commande</h2>

  <select id="plat">
    <option>Pizza</option>
    <option>Burger</option>
    <option>Tacos</option>
  </select>

  <input id="nom" placeholder="Nom">
  <input id="telephone" placeholder="Téléphone">

  <button id="btn">Commander</button>
</div>

<!-- FIREBASE + JS -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxuLk1rBMs4_lipD8s6pIsV9U41tuyPYo",
  authDomain: "mvp-restaurant.firebaseapp.com",
  projectId: "mvp-restaurant",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("btn").addEventListener("click", async () => {

  const nom = document.getElementById("nom").value;
  const tel = document.getElementById("telephone").value;
  const plat = document.getElementById("plat").value;

  if (!nom || !tel) {
    alert("Remplir les champs !");
    return;
  }

  try {
    await addDoc(collection(db, "commandes"), {
      nom: nom,
      telephone: tel,
      plat: plat,
      date: new Date()
    });

    alert("Commande enregistrée !");

  } catch (e) {
    alert("Erreur Firebase");
    console.log(e);
  }

});

</script>

</body>
</html>
